<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NyumbaTrack — Smart Rent Management for Ugandan Landlords</title>
    <meta name="description" content="Track tenants, rent payments, and receipts — built for Ugandan landlords." />
    <link rel="manifest" href="/manifest.json" />
    <script>
      (function () {
        try {
          var t = localStorage.getItem('nyumbatrack_theme');
          if (t === 'dark') {
            document.documentElement.classList.add('dark');
            document.documentElement.dataset.theme = 'dark';
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
