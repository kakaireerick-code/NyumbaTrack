name: Configure Vercel VAPID

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: configure-vapid
  cancel-in-progress: false

jobs:
  vapid:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check Vercel secrets
        id: secrets
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ] || [ -z "${{ secrets.VERCEL_ORG_ID }}" ] || [ -z "${{ secrets.VERCEL_PROJECT_ID }}" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Vercel secrets not set — cannot configure VAPID. See docs/VERCEL-SECRETS-CHECKLIST.md"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.secrets.outputs.configured == 'true'
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        if: steps.secrets.outputs.configured == 'true'
        run: npm ci

      - name: Upload VAPID keys to Vercel Production
        if: steps.secrets.outputs.configured == 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
          SKIP_DEPLOY: '1'
        run: node scripts/configure-vapid-ci.mjs

      - name: Install Vercel CLI
        if: steps.secrets.outputs.configured == 'true'
        run: npm install --global vercel@latest

      - name: Redeploy Production (pick up new env vars)
        if: steps.secrets.outputs.configured == 'true'
        run: |
          vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
          vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
          vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Production check
        if: steps.secrets.outputs.configured == 'true'
        run: WAIT_SECS=120 npm run check:vapid
